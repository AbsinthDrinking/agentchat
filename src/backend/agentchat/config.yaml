# 服务配置
server:
  env: "dev" # prod / test / dev
  host: "127.0.0.1"
  port: 7860
  name: "AgentChat" # 项目名称
  version: "2.5.0" # 服务版本号

# 数据库配置：MySQL (请根据实际配置更改 endpoint)
# 格式：mysql+pymysql://<user>:<password>@<host>:<port>/<database>
mysql:
  endpoint: "mysql+pymysql://root:your-password@localhost:3306/agentchat" # 同步连接配置
  async_endpoint: "mysql+aiomysql://root:your-password@localhost:3306/agentchat" # 异步连接配置

# 缓存配置：Redis
redis:
  endpoint: "redis://localhost:6379" # Redis 连接地址

# 多模型服务配置 (LLM、Embedding、Rerank)
multi_models:
  # 对话模型配置
  conversation_model:
    api_key: "your-api-key"
    base_url: "https://api.openai.com/v1"
    model_name: "gpt-4"
  # 工具调用/Function Call 模型配置
  tool_call_model:
    api_key: "your-api-key"
    base_url: "https://api.openai.com/v1"
    model_name: "gpt-4"
  # 复杂推理模型配置
  reasoning_model:
    api_key: "your-api-key"
    base_url: "https://api.openai.com/v1"
    model_name: "gpt-4"
  # 文生图模型配置
  text2image:
    api_key: "your-api-key"
    base_url: "https://api.openai.com/v1"
    model_name: "dall-e-3"
  # 多模态 (视觉) 模型配置
  qwen_vl:
    api_key: "your-api-key"
    base_url: "https://api.openai.com/v1"
    model_name: "gpt-4-vision"

  # Embedding 模型配置 (用于向量化)
  embedding:
    api_key: "your-api-key"
    base_url: "https://api.openai.com/v1"
    model_name: "text-embedding-3-small"

  # Rerank 模型配置 (用于重排序召回结果)
  rerank:
    api_key: "your-api-key"
    base_url: "https://api.openai.com/v1"
    model_name: "text-rerank"


# 外部工具 (Tool) 配置
tools:
  # 高德地图天气 API 配置
  weather:
    api_key: "your-api-key"
    endpoint: "https://restapi.amap.com/v3/weather/weatherInfo?parameters"
  # Tavily 联网搜索 API 配置
  tavily:
    api_key: "your-api-key"
  # SerpApi 上的 Google Search API 配置
  google:
    api_key: "your-api-key"
  # 阿里云快递查询 API 配置
  delivery:
    api_key: "your-api-key"
    endpoint: "https://qyexpress.market.alicloudapi.com/composite/queryexpress"
  # BoCha 联网搜索 API 配置
  bocha:
    api_key: "your-api-key"
    endpoint: "https://api.bochaai.com/v1/web-search"

# RAG (检索增强生成) 配置
rag:
  enable_summary: False # 是否对知识库片段进行摘要
  enable_elasticsearch: False # 是否启用 Elasticsearch 进行关键词搜索
  enable_ik_analyzer: False # 是否启用 Elasticsearch 的IK分词器

  retrival:
    top_k: 5  # 知识库召回的最大数量
    min_score: 0.2 # 知识库召回结果的最小相似度分数阈值

  split:
    chunk_size: 500 # 知识库文档分块的最大字符数
    overlap_size: 100 # 文档分块之间的重叠字符数

  # ES数据库配置，主要做关键词召回
  elasticsearch:
    hosts: "http://127.0.0.1:9200" # Elasticsearch 连接地址。如果 'enable_elasticsearch' 为 False，则不需要填写。

  # 向量数据库配置 (Vector DB)
  vector_db:
    host: "127.0.0.1"
    port: "19530"
    mode: "chroma" # 向量库模式: standalone (Milvus), lite (轻量Milvus), chroma (ChromaDB)

# 对象存储配置
storage:
  mode: "minio" # minio / oss

  oss:
    access_key_id: "your-access-key-id"
    access_key_secret: "your-access-key-secret"
    endpoint: "oss-cn-beijing.aliyuncs.com"
    bucket_name: "your-bucket"
    base_url: "https://your-bucket.oss-cn-beijing.aliyuncs.com"

  minio:
    access_key_id: "minioadmin"
    access_key_secret: "minioadmin"
    endpoint: "127.0.0.1:9000"
    bucket_name: "agentchat"
    base_url: "http://127.0.0.1:9000/agentchat"

# 默认配置 (如图标 URL, 资源链接)
default_config:
  mcp_logo_url: ""
  tool_logo_url: ""
  agent_logo_url: ""
  mars_daily_url: "https://news.aibase.com/zh/news"
  memory_collection_name: "memory"

# 扩展功能：微信配置 (不添加也可正常运行)
wechat_config:
  token: "your-token"
  app_id: "your-app-id"
  secret: "your-secret"

# 追踪工具 Langfuse 配置 (可选)
langfuse:
  trace_name: "agentchat"
  host: "https://cloud.langfuse.com"
  public_key: "your-public-key"
  secret_key: "your-secret-key"
  user_id: "admin"

# 接口白名单路径
whitelist_paths: ["/mcp/*"]
