<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="eye" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- 圆角方形背景 -->
  <rect x="10" y="10" width="180" height="180" rx="36" ry="36" fill="url(#bg)"/>

  <!-- 头顶天线 -->
  <line x1="100" y1="18" x2="100" y2="2" stroke="url(#bg)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="100" cy="6" r="6" fill="url(#bg)"/>

  <!-- 左眼 -->
  <circle cx="72" cy="85" r="18" fill="white"/>
  <circle cx="76" cy="81" r="8" fill="url(#eye)"/>
  <circle cx="80" cy="77" r="3" fill="white"/>

  <!-- 右眼 -->
  <circle cx="128" cy="85" r="18" fill="white"/>
  <circle cx="124" cy="81" r="8" fill="url(#eye)"/>
  <circle cx="120" cy="77" r="3" fill="white"/>

  <!-- 鼻子 -->
  <ellipse cx="100" cy="115" rx="8" ry="6" fill="rgba(255,255,255,0.5)"/>

  <!-- 微笑 -->
  <path d="M 80 138 Q 100 158 120 138" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- 左耳 -->
  <rect x="18" y="75" width="8" height="28" rx="4" fill="rgba(255,255,255,0.3)"/>

  <!-- 右耳 -->
  <rect x="174" y="75" width="8" height="28" rx="4" fill="rgba(255,255,255,0.3)"/>

  <!-- 腮红(左) -->
  <circle cx="54" cy="120" r="10" fill="rgba(236,72,153,0.25)"/>

  <!-- 腮红(右) -->
  <circle cx="146" cy="120" r="10" fill="rgba(236,72,153,0.25)"/>
</svg>
